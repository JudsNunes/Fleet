openapi: 3.0.0
info:
  title: Evolutech Fleet Management API
  description: API para gerenciamento de frota veicular - BFF (Backend for Frontend)
  version: 1.0.0
  contact:
    email: apiteam@evolutech.com
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html

servers:
  - url: http://localhost:8080/api/v1
    description: Desenvolvimento

tags:
  - name: Vehicle
    description: Operações com veículos
  - name: Maintenance
    description: Operações com manutenções
  - name: Driver
    description: Gestão de motoristas

paths:
  /vehicles:
    get:
      tags:
        - Vehicle
      summary: Listar todos os veículos
      operationId: getAllVehicles
      parameters:
        - name: plate
          in: query
          schema:
            type: string
          description: Filtrar por placa (parcial)
        - name: brand
          in: query
          schema:
            type: string
          description: Filtrar por marca (parcial)
        - name: status
          in: query
          schema:
            type: string
            enum: [ACTIVE, INACTIVE, MAINTENANCE, DECOMMISSIONED]
          description: Filtrar por status
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Lista de veículos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VehiclePage'
    post:
      tags:
        - Vehicle
      summary: Criar um novo veículo
      operationId: createVehicle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VehicleRequest'
      responses:
        '201':
          description: Veículo criado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Vehicle'
        '400':
          description: Dados inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Placa duplicada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /vehicles/{id}:
    get:
      tags:
        - Vehicle
      summary: Buscar veículo por ID
      operationId: getVehicleById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Veículo encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Vehicle'
        '404':
          description: Veículo não encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags:
        - Vehicle
      summary: Atualizar um veículo
      operationId: updateVehicle
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VehicleRequest'
      responses:
        '200':
          description: Veículo atualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Vehicle'
        '404':
          description: Veículo não encontrado
        '400':
          description: Dados inválidos
    delete:
      tags:
        - Vehicle
      summary: Deletar um veículo (soft-delete)
      operationId: deleteVehicle
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Veículo deletado
        '404':
          description: Veículo não encontrado

  /vehicles/{id}/status:
    patch:
      tags:
        - Vehicle
      summary: Atualizar status do veículo
      operationId: updateVehicleStatus
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [ACTIVE, INACTIVE, MAINTENANCE, DECOMMISSIONED]
      responses:
        '200':
          description: Status atualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Vehicle'
        '404':
          description: Veículo não encontrado

  /maintenances:
    get:
      tags:
        - Maintenance
      summary: Listar todas as manutenções
      operationId: getAllMaintenances
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Lista de manutenções
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MaintenancePage'
    post:
      tags:
        - Maintenance
      summary: Criar uma nova manutenção
      operationId: createMaintenance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MaintenanceRequest'
      responses:
        '201':
          description: Manutenção criada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Maintenance'
        '400':
          description: Dados inválidos
        '404':
          description: Veículo não encontrado

  /maintenances/{id}:
    get:
      tags:
        - Maintenance
      summary: Buscar manutenção por ID
      operationId: getMaintenanceById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Manutenção encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Maintenance'
        '404':
          description: Manutenção não encontrada
    put:
      tags:
        - Maintenance
      summary: Atualizar uma manutenção
      operationId: updateMaintenance
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MaintenanceRequest'
      responses:
        '200':
          description: Manutenção atualizada
        '404':
          description: Manutenção não encontrada
    delete:
      tags:
        - Maintenance
      summary: Deletar uma manutenção (soft-delete)
      operationId: deleteMaintenance
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Manutenção deletada
        '404':
          description: Manutenção não encontrada

  /maintenances/vehicle/{vehicleId}:
    get:
      tags:
        - Maintenance
      summary: Listar manutenções por veículo
      operationId: getMaintenancesByVehicleId
      parameters:
        - name: vehicleId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Manutenções encontradas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Maintenance'

  /maintenances/status/{status}:
    get:
      tags:
        - Maintenance
      summary: Listar manutenções por status
      operationId: getMaintenancesByStatus
      parameters:
        - name: status
          in: path
          required: true
          schema:
            type: string
            enum: [PENDING, IN_PROGRESS, COMPLETED, OVERDUE]
      responses:
        '200':
          description: Manutenções encontradas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Maintenance'

  /drivers:
    get:
      tags:
        - Driver
      summary: Listar motoristas
      operationId: getAllDrivers
      parameters:
        - name: name
          in: query
          schema:
            type: string
        - name: cpf
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [ACTIVE, INACTIVE, SUSPENDED]
        - name: cnhStatus
          in: query
          schema:
            type: string
            enum: [ACTIVE, EXPIRED, SUSPENDED]
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Lista de motoristas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DriverPage'
    post:
      tags:
        - Driver
      summary: Criar motorista
      operationId: createDriver
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DriverRequest'
      responses:
        '201':
          description: Motorista criado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Driver'
        '400':
          description: Dados inválidos
        '409':
          description: CPF ou CNH duplicada

  /drivers/{id}:
    get:
      tags:
        - Driver
      summary: Buscar motorista por UUID
      operationId: getDriverById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Motorista encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Driver'
        '404':
          description: Motorista não encontrado
    put:
      tags:
        - Driver
      summary: Atualizar motorista
      operationId: updateDriver
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DriverRequest'
      responses:
        '200':
          description: Motorista atualizado
        '404':
          description: Motorista não encontrado
    delete:
      tags:
        - Driver
      summary: Deletar motorista (soft-delete)
      operationId: deleteDriver
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Motorista deletado
        '404':
          description: Motorista não encontrado

  /drivers/{id}/status:
    patch:
      tags:
        - Driver
      summary: Atualizar status do motorista
      operationId: updateDriverStatus
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [ACTIVE, INACTIVE, SUSPENDED]
      responses:
        '200':
          description: Status atualizado
        '404':
          description: Motorista não encontrado

  /drivers/cpf/{cpf}:
    get:
      tags:
        - Driver
      summary: Buscar motorista por CPF
      operationId: getDriverByCpf
      parameters:
        - name: cpf
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Motorista encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Driver'
        '404':
          description: Motorista não encontrado

  /drivers/expiring-cnhs:
    get:
      tags:
        - Driver
      summary: Listar motoristas com CNH vencendo
      operationId: getExpiringCnhs
      parameters:
        - name: days
          in: query
          schema:
            type: integer
            default: 30
      responses:
        '200':
          description: Lista de motoristas com CNH vencendo
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Driver'

components:
  schemas:
    Vehicle:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: UUID único do veículo
        plate:
          type: string
          description: "Placa do veiculo (Mercosul ou antigo)"
          example: "ABC1D23"
        model:
          type: string
          description: Modelo do veículo
          example: Corolla
        brand:
          type: string
          description: Marca do veículo
          example: Toyota
        year:
          type: integer
          description: Ano de fabricação
          example: 2023
        color:
          type: string
          description: Cor do veículo
          example: Preto
        mileage:
          type: number
          format: double
          description: Quilometragem
          example: 5000.0
        status:
          type: string
          enum: [ACTIVE, INACTIVE, MAINTENANCE, DECOMMISSIONED]
          description: Status do veículo
        chassis:
          type: string
          description: "Número do chassi (VIN) - 17 caracteres"
          example: "9BWZZZ377VE000001"
        renavam:
          type: string
          description: "Registro Nacional de Veículos Automotores - 11 dígitos"
          example: "12345678901"
        fuelType:
          type: string
          enum: [GASOLINE, DIESEL, ETHANOL, FLEX, ELECTRIC, HYBRID]
          description: Tipo de combustível
        cargoCapacityKg:
          type: number
          format: double
          description: Capacidade de carga em kg
          example: 500.0
        passengerCapacity:
          type: integer
          description: Capacidade de passageiros
          example: 5
        engineType:
          type: string
          description: "Tipo do motor (ex: 1.0, 1.8, 2.0, EV)"
          example: "2.0"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    VehicleRequest:
      type: object
      required:
        - plate
        - model
        - brand
        - year
        - chassis
        - renavam
        - fuelType
      properties:
        plate:
          type: string
          description: "Placa do veiculo (Mercosul ou antigo)"
          example: "ABC1D23"
        model:
          type: string
          example: Corolla
        brand:
          type: string
          example: Toyota
        year:
          type: integer
          example: 2023
        color:
          type: string
          example: Preto
        mileage:
          type: number
          format: double
          example: 5000.0
        chassis:
          type: string
          description: "Número do chassi (VIN) - 17 caracteres"
          example: "9BWZZZ377VE000001"
        renavam:
          type: string
          description: "Registro Nacional de Veículos Automotores - 11 dígitos"
          example: "12345678901"
        fuelType:
          type: string
          enum: [GASOLINE, DIESEL, ETHANOL, FLEX, ELECTRIC, HYBRID]
          description: Tipo de combustível
        cargoCapacityKg:
          type: number
          format: double
          description: Capacidade de carga em kg
          example: 500.0
        passengerCapacity:
          type: integer
          description: Capacidade de passageiros
          example: 5
        engineType:
          type: string
          description: "Tipo do motor (ex: 1.0, 1.8, 2.0, EV)"
          example: "2.0"

    VehiclePage:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/Vehicle'
        totalElements:
          type: integer
        totalPages:
          type: integer
        size:
          type: integer
        number:
          type: integer

    Maintenance:
      type: object
      properties:
        id:
          type: string
          format: uuid
        vehicleId:
          type: string
          format: uuid
        description:
          type: string
          example: Troca de óleo
        type:
          type: string
          enum: [MAINTENANCE, FUEL, TOLL, PARKING, OTHER]
        cost:
          type: number
          format: double
          example: 150.00
        mileage:
          type: number
          format: double
          description: Quilometragem atual
        nextMileage:
          type: number
          format: double
          description: Próxima manutenção
        status:
          type: string
          enum: [PENDING, IN_PROGRESS, COMPLETED, OVERDUE]
        maintenanceDate:
          type: string
          format: date
          example: 2024-01-15
        serviceOrderId:
          type: string
          format: uuid
          description: ID da Ordem de Serviço vinculada
        costCenterId:
          type: string
          description: ID do centro de custo
        projectId:
          type: string
          description: ID do projeto
        invoiceFuelType:
          type: string
          enum: [GASOLINE, DIESEL, ETHANOL, FLEX, ELECTRIC, HYBRID]
          description: Tipo de combustível da nota fiscal
        litersFilled:
          type: number
          format: double
          description: Litros abastecidos
        distanceTraveled:
          type: number
          format: double
          description: Distância percorrida (km)
        anomalousConsumption:
          type: boolean
          description: Flag de consumo anômalo
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    MaintenanceRequest:
      type: object
      required:
        - vehicleId
        - description
        - type
        - cost
        - mileage
        - nextMileage
        - maintenanceDate
      properties:
        vehicleId:
          type: string
          format: uuid
        description:
          type: string
          example: Troca de óleo
        type:
          type: string
          enum: [MAINTENANCE, FUEL, TOLL, PARKING, OTHER]
        cost:
          type: number
          format: double
          example: 150.00
        mileage:
          type: number
          format: double
        nextMileage:
          type: number
          format: double
        maintenanceDate:
          type: string
          format: date
          example: 2024-01-15

    MaintenancePage:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/Maintenance'
        totalElements:
          type: integer
        totalPages:
          type: integer
        size:
          type: integer
        number:
          type: integer

    Driver:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        cpf:
          type: string
        cnhNumber:
          type: string
        cnhCategory:
          type: string
          enum: [A, B, C, D, E, AB, AC, AD, AE]
        cnhExpiryDate:
          type: string
          format: date
        cnhStatus:
          type: string
          enum: [ACTIVE, EXPIRED, SUSPENDED]
        phone:
          type: string
        email:
          type: string
        birthDate:
          type: string
          format: date
        address:
          type: string
        status:
          type: string
          enum: [ACTIVE, INACTIVE, SUSPENDED]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    DriverRequest:
      type: object
      required:
        - name
        - cpf
        - cnhNumber
        - cnhCategory
        - cnhExpiryDate
      properties:
        name:
          type: string
        cpf:
          type: string
        cnhNumber:
          type: string
        cnhCategory:
          type: string
          enum: [A, B, C, D, E, AB, AC, AD, AE]
        cnhExpiryDate:
          type: string
          format: date
        phone:
          type: string
        email:
          type: string
        birthDate:
          type: string
          format: date
        address:
          type: string

    DriverPage:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/Driver'
        totalElements:
          type: integer
        totalPages:
          type: integer
        size:
          type: integer
        number:
          type: integer

    ErrorResponse:
      type: object
      properties:
        code:
          type: string
          example: NOT_FOUND
        message:
          type: string
          example: Vehicle not found
        status:
          type: integer
          example: 404
        timestamp:
          type: string
          format: date-time
        path:
          type: string
        detail:
          type: string
