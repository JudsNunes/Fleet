openapi: 3.0.0
info:
  title: Evolutech Fleet Management API
  description: API para gerenciamento de frota veicular - BFF (Backend for Frontend)
  version: 1.0.0
  contact:
    email: apiteam@evolutech.com
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html

servers:
  - url: http://localhost:8080/api/v1
    description: Desenvolvimento

tags:
  - name: Vehicle
    description: Operações com veículos
  - name: Maintenance
    description: Operações com manutenções

paths:
  /vehicles:
    get:
      tags:
        - Vehicle
      summary: Listar todos os veículos
      operationId: getAllVehicles
      parameters:
        - name: plate
          in: query
          schema:
            type: string
          description: Filtrar por placa (parcial)
        - name: brand
          in: query
          schema:
            type: string
          description: Filtrar por marca (parcial)
        - name: status
          in: query
          schema:
            type: string
            enum: [ACTIVE, INACTIVE, MAINTENANCE, DECOMMISSIONED]
          description: Filtrar por status
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Lista de veículos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VehiclePage'
    post:
      tags:
        - Vehicle
      summary: Criar um novo veículo
      operationId: createVehicle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VehicleRequest'
      responses:
        '201':
          description: Veículo criado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Vehicle'
        '400':
          description: Dados inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Placa duplicada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /vehicles/{id}:
    get:
      tags:
        - Vehicle
      summary: Buscar veículo por ID
      operationId: getVehicleById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Veículo encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Vehicle'
        '404':
          description: Veículo não encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags:
        - Vehicle
      summary: Atualizar um veículo
      operationId: updateVehicle
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VehicleRequest'
      responses:
        '200':
          description: Veículo atualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Vehicle'
        '404':
          description: Veículo não encontrado
        '400':
          description: Dados inválidos
    delete:
      tags:
        - Vehicle
      summary: Deletar um veículo (soft-delete)
      operationId: deleteVehicle
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Veículo deletado
        '404':
          description: Veículo não encontrado

  /vehicles/{id}/status:
    patch:
      tags:
        - Vehicle
      summary: Atualizar status do veículo
      operationId: updateVehicleStatus
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [ACTIVE, INACTIVE, MAINTENANCE, DECOMMISSIONED]
      responses:
        '200':
          description: Status atualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Vehicle'
        '404':
          description: Veículo não encontrado

  /maintenances:
    get:
      tags:
        - Maintenance
      summary: Listar todas as manutenções
      operationId: getAllMaintenances
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Lista de manutenções
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MaintenancePage'
    post:
      tags:
        - Maintenance
      summary: Criar uma nova manutenção
      operationId: createMaintenance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MaintenanceRequest'
      responses:
        '201':
          description: Manutenção criada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Maintenance'
        '400':
          description: Dados inválidos
        '404':
          description: Veículo não encontrado

  /maintenances/{id}:
    get:
      tags:
        - Maintenance
      summary: Buscar manutenção por ID
      operationId: getMaintenanceById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Manutenção encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Maintenance'
        '404':
          description: Manutenção não encontrada
    put:
      tags:
        - Maintenance
      summary: Atualizar uma manutenção
      operationId: updateMaintenance
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MaintenanceRequest'
      responses:
        '200':
          description: Manutenção atualizada
        '404':
          description: Manutenção não encontrada
    delete:
      tags:
        - Maintenance
      summary: Deletar uma manutenção (soft-delete)
      operationId: deleteMaintenance
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Manutenção deletada
        '404':
          description: Manutenção não encontrada

  /maintenances/vehicle/{vehicleId}:
    get:
      tags:
        - Maintenance
      summary: Listar manutenções por veículo
      operationId: getMaintenancesByVehicleId
      parameters:
        - name: vehicleId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Manutenções encontradas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Maintenance'

  /maintenances/status/{status}:
    get:
      tags:
        - Maintenance
      summary: Listar manutenções por status
      operationId: getMaintenancesByStatus
      parameters:
        - name: status
          in: path
          required: true
          schema:
            type: string
            enum: [PENDING, IN_PROGRESS, COMPLETED, OVERDUE]
      responses:
        '200':
          description: Manutenções encontradas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Maintenance'

components:
  schemas:
    Vehicle:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: UUID único do veículo
        plate:
          type: string
          description: "Placa do veiculo (Mercosul ou antigo)"
          example: "ABC1D23"
        model:
          type: string
          description: Modelo do veículo
          example: Corolla
        brand:
          type: string
          description: Marca do veículo
          example: Toyota
        year:
          type: integer
          description: Ano de fabricação
          example: 2023
        color:
          type: string
          description: Cor do veículo
          example: Preto
        mileage:
          type: number
          format: double
          description: Quilometragem
          example: 5000.0
        status:
          type: string
          enum: [ACTIVE, INACTIVE, MAINTENANCE, DECOMMISSIONED]
          description: Status do veículo
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    VehicleRequest:
      type: object
      required:
        - plate
        - model
        - brand
        - year
      properties:
        plate:
          type: string
          description: "Placa do veiculo (Mercosul ou antigo)"
          example: "ABC1D23"
        model:
          type: string
          example: Corolla
        brand:
          type: string
          example: Toyota
        year:
          type: integer
          example: 2023
        color:
          type: string
          example: Preto
        mileage:
          type: number
          format: double
          example: 5000.0

    VehiclePage:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/Vehicle'
        totalElements:
          type: integer
        totalPages:
          type: integer
        size:
          type: integer
        number:
          type: integer

    Maintenance:
      type: object
      properties:
        id:
          type: string
          format: uuid
        vehicleId:
          type: string
          format: uuid
        description:
          type: string
          example: Troca de óleo
        type:
          type: string
          enum: [MAINTENANCE, FUEL, TOLL, PARKING, OTHER]
        cost:
          type: number
          format: double
          example: 150.00
        mileage:
          type: number
          format: double
          description: Quilometragem atual
        nextMileage:
          type: number
          format: double
          description: Próxima manutenção
        status:
          type: string
          enum: [PENDING, IN_PROGRESS, COMPLETED, OVERDUE]
        maintenanceDate:
          type: string
          format: date
          example: 2024-01-15
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    MaintenanceRequest:
      type: object
      required:
        - vehicleId
        - description
        - type
        - cost
        - mileage
        - nextMileage
        - maintenanceDate
      properties:
        vehicleId:
          type: string
          format: uuid
        description:
          type: string
          example: Troca de óleo
        type:
          type: string
          enum: [MAINTENANCE, FUEL, TOLL, PARKING, OTHER]
        cost:
          type: number
          format: double
          example: 150.00
        mileage:
          type: number
          format: double
        nextMileage:
          type: number
          format: double
        maintenanceDate:
          type: string
          format: date
          example: 2024-01-15

    MaintenancePage:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/Maintenance'
        totalElements:
          type: integer
        totalPages:
          type: integer
        size:
          type: integer
        number:
          type: integer

    ErrorResponse:
      type: object
      properties:
        code:
          type: string
          example: NOT_FOUND
        message:
          type: string
          example: Vehicle not found
        status:
          type: integer
          example: 404
        timestamp:
          type: string
          format: date-time
        path:
          type: string
        detail:
          type: string
