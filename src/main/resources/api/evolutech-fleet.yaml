openapi: 3.0.0
info:
  title: Evolutech Fleet Management API
  description: API para gerenciamento de frota veicular - BFF (Backend for Frontend)
  version: 1.0.0
  contact:
    email: apiteam@evolutech.com
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html

servers:
  - url: http://localhost:8080/api/v1
    description: Desenvolvimento

tags:
  - name: Vehicle
    description: Operações com veículos
  - name: Maintenance
    description: Operações com manutenções
  - name: ServiceOrder
    description: Ordens de Serviço
  - name: AuditLog
    description: Logs de auditoria
  - name: Fine
    description: Multas de trânsito

paths:
  /vehicles:
    get:
      tags:
        - Vehicle
      summary: Listar todos os veículos
      operationId: getAllVehicles
      parameters:
        - name: plate
          in: query
          schema:
            type: string
          description: Filtrar por placa (parcial)
        - name: brand
          in: query
          schema:
            type: string
          description: Filtrar por marca (parcial)
        - name: status
          in: query
          schema:
            type: string
            enum: [ACTIVE, INACTIVE, MAINTENANCE, DECOMMISSIONED]
          description: Filtrar por status
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Lista de veículos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VehiclePage'
    post:
      tags:
        - Vehicle
      summary: Criar um novo veículo
      operationId: createVehicle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VehicleRequest'
      responses:
        '201':
          description: Veículo criado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Vehicle'
        '400':
          description: Dados inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Placa duplicada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /vehicles/{id}:
    get:
      tags:
        - Vehicle
      summary: Buscar veículo por ID
      operationId: getVehicleById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Veículo encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Vehicle'
        '404':
          description: Veículo não encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags:
        - Vehicle
      summary: Atualizar um veículo
      operationId: updateVehicle
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VehicleRequest'
      responses:
        '200':
          description: Veículo atualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Vehicle'
        '404':
          description: Veículo não encontrado
        '400':
          description: Dados inválidos
    delete:
      tags:
        - Vehicle
      summary: Deletar um veículo (soft-delete)
      operationId: deleteVehicle
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Veículo deletado
        '404':
          description: Veículo não encontrado

  /vehicles/{id}/status:
    patch:
      tags:
        - Vehicle
      summary: Atualizar status do veículo
      operationId: updateVehicleStatus
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [ACTIVE, INACTIVE, MAINTENANCE, DECOMMISSIONED]
      responses:
        '200':
          description: Status atualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Vehicle'
        '404':
          description: Veículo não encontrado

  /maintenances:
    get:
      tags:
        - Maintenance
      summary: Listar todas as manutenções
      operationId: getAllMaintenances
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Lista de manutenções
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MaintenancePage'
    post:
      tags:
        - Maintenance
      summary: Criar uma nova manutenção
      operationId: createMaintenance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MaintenanceRequest'
      responses:
        '201':
          description: Manutenção criada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Maintenance'
        '400':
          description: Dados inválidos
        '404':
          description: Veículo não encontrado

  /maintenances/{id}:
    get:
      tags:
        - Maintenance
      summary: Buscar manutenção por ID
      operationId: getMaintenanceById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Manutenção encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Maintenance'
        '404':
          description: Manutenção não encontrada
    put:
      tags:
        - Maintenance
      summary: Atualizar uma manutenção
      operationId: updateMaintenance
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MaintenanceRequest'
      responses:
        '200':
          description: Manutenção atualizada
        '404':
          description: Manutenção não encontrada
    delete:
      tags:
        - Maintenance
      summary: Deletar uma manutenção (soft-delete)
      operationId: deleteMaintenance
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Manutenção deletada
        '404':
          description: Manutenção não encontrada

  /maintenances/vehicle/{vehicleId}:
    get:
      tags:
        - Maintenance
      summary: Listar manutenções por veículo
      operationId: getMaintenancesByVehicleId
      parameters:
        - name: vehicleId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Manutenções encontradas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Maintenance'

  /maintenances/status/{status}:
    get:
      tags:
        - Maintenance
      summary: Listar manutenções por status
      operationId: getMaintenancesByStatus
      parameters:
        - name: status
          in: path
          required: true
          schema:
            type: string
            enum: [PENDING, IN_PROGRESS, COMPLETED, OVERDUE]
      responses:
        '200':
          description: Manutenções encontradas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Maintenance'

  /service-orders:
    get:
      tags:
        - ServiceOrder
      summary: Listar todas as ordens de serviço
      operationId: getAllServiceOrders
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Lista de ordens de serviço
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceOrderPage'
    post:
      tags:
        - ServiceOrder
      summary: Criar uma nova ordem de serviço
      operationId: createServiceOrder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServiceOrderRequest'
      responses:
        '201':
          description: Ordem de serviço criada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceOrder'
        '400':
          description: Dados inválidos
        '404':
          description: Veículo não encontrado

  /service-orders/{id}:
    get:
      tags:
        - ServiceOrder
      summary: Buscar ordem de serviço por ID
      operationId: getServiceOrderById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Ordem de serviço encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceOrder'
        '404':
          description: Ordem de serviço não encontrada
    put:
      tags:
        - ServiceOrder
      summary: Atualizar uma ordem de serviço
      operationId: updateServiceOrder
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServiceOrderRequest'
      responses:
        '200':
          description: Ordem de serviço atualizada
        '404':
          description: Ordem de serviço não encontrada
    delete:
      tags:
        - ServiceOrder
      summary: Deletar uma ordem de serviço (soft-delete)
      operationId: deleteServiceOrder
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Ordem de serviço deletada
        '404':
          description: Ordem de serviço não encontrada

  /service-orders/{id}/approve:
    patch:
      tags:
        - ServiceOrder
      summary: Aprovar ordem de serviço
      operationId: approveServiceOrder
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServiceOrderApproval'
      responses:
        '200':
          description: Ordem de serviço aprovada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceOrder'
        '400':
          description: Status inválido para aprovação
        '404':
          description: Ordem de serviço não encontrada

  /service-orders/{id}/reject:
    patch:
      tags:
        - ServiceOrder
      summary: Rejeitar ordem de serviço
      operationId: rejectServiceOrder
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServiceOrderApproval'
      responses:
        '200':
          description: Ordem de serviço rejeitada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceOrder'
        '400':
          description: Status inválido para rejeição
        '404':
          description: Ordem de serviço não encontrada

  /service-orders/{id}/complete:
    patch:
      tags:
        - ServiceOrder
      summary: Completar ordem de serviço
      operationId: completeServiceOrder
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Ordem de serviço completada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceOrder'
        '400':
          description: Status inválido para completar
        '404':
          description: Ordem de serviço não encontrada

  /service-orders/vehicle/{vehicleId}:
    get:
      tags:
        - ServiceOrder
      summary: Listar ordens de serviço por veículo
      operationId: getServiceOrdersByVehicle
      parameters:
        - name: vehicleId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Ordens de serviço encontradas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceOrderPage'

  /service-orders/status/{status}:
    get:
      tags:
        - ServiceOrder
      summary: Listar ordens de serviço por status
      operationId: getServiceOrdersByStatus
      parameters:
        - name: status
          in: path
          required: true
          schema:
            type: string
            enum: [PENDING, APPROVED, REJECTED, COMPLETED]
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Ordens de serviço encontradas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceOrderPage'

  /service-orders/warranty/{vehicleId}:
    get:
      tags:
        - ServiceOrder
      summary: Listar garantias ativas por veículo
      operationId: getActiveWarranties
      parameters:
        - name: vehicleId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Garantias ativas encontradas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ServiceOrder'

  /audit-logs:
    get:
      tags:
        - AuditLog
      summary: Listar todos os logs de auditoria
      operationId: getAllAuditLogs
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Lista de logs de auditoria
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditLogPage'

  /audit-logs/entity/{entityType}/{entityId}:
    get:
      tags:
        - AuditLog
      summary: Listar logs de auditoria por entidade
      operationId: getAuditLogsByEntity
      parameters:
        - name: entityType
          in: path
          required: true
          schema:
            type: string
        - name: entityId
          in: path
          required: true
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Logs de auditoria encontrados
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditLogPage'

  /audit-logs/entity/{entityType}:
    get:
      tags:
        - AuditLog
      summary: Listar logs de auditoria por tipo de entidade
      operationId: getAuditLogsByEntityType
      parameters:
        - name: entityType
          in: path
          required: true
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Logs de auditoria encontrados
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditLogPage'

  /audit-logs/user/{userId}:
    get:
      tags:
        - AuditLog
      summary: Listar logs de auditoria por usuário
      operationId: getAuditLogsByUser
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Logs de auditoria encontrados
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditLogPage'

  /fines:
    get:
      tags:
        - Fine
      summary: Listar todas as multas
      operationId: getAllFines
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Lista de multas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FinePage'
    post:
      tags:
        - Fine
      summary: Criar uma nova multa
      operationId: createFine
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FineRequest'
      responses:
        '201':
          description: Multa criada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Fine'
        '400':
          description: Dados inválidos
        '404':
          description: Veículo não encontrado

  /fines/{id}:
    get:
      tags:
        - Fine
      summary: Buscar multa por ID
      operationId: getFineById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Multa encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Fine'
        '404':
          description: Multa não encontrada
    put:
      tags:
        - Fine
      summary: Atualizar uma multa
      operationId: updateFine
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FineRequest'
      responses:
        '200':
          description: Multa atualizada
        '404':
          description: Multa não encontrada
    delete:
      tags:
        - Fine
      summary: Deletar uma multa
      operationId: deleteFine
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Multa deletada
        '404':
          description: Multa não encontrada

  /fines/driver/{driverCpf}:
    get:
      tags:
        - Fine
      summary: Listar multas por CPF do motorista
      operationId: getFinesByDriverCpf
      parameters:
        - name: driverCpf
          in: path
          required: true
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Multas encontradas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FinePage'

  /fines/vehicle/{vehicleId}:
    get:
      tags:
        - Fine
      summary: Listar multas por veículo
      operationId: getFinesByVehicle
      parameters:
        - name: vehicleId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Multas encontradas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FinePage'

  /fines/status/{status}:
    get:
      tags:
        - Fine
      summary: Listar multas por status
      operationId: getFinesByStatus
      parameters:
        - name: status
          in: path
          required: true
          schema:
            type: string
            enum: [PENDING, PAID, DISPUTED]
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Multas encontradas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FinePage'

components:
  schemas:
    Vehicle:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: UUID único do veículo
        plate:
          type: string
          description: "Placa do veiculo (Mercosul ou antigo)"
          example: "ABC1D23"
        model:
          type: string
          description: Modelo do veículo
          example: Corolla
        brand:
          type: string
          description: Marca do veículo
          example: Toyota
        year:
          type: integer
          description: Ano de fabricação
          example: 2023
        color:
          type: string
          description: Cor do veículo
          example: Preto
        mileage:
          type: number
          format: double
          description: Quilometragem
          example: 5000.0
        status:
          type: string
          enum: [ACTIVE, INACTIVE, MAINTENANCE, DECOMMISSIONED]
          description: Status do veículo
        chassis:
          type: string
          description: "Número do chassi (VIN) - 17 caracteres"
          example: "9BWZZZ377VE000001"
        renavam:
          type: string
          description: "Registro Nacional de Veículos Automotores - 11 dígitos"
          example: "12345678901"
        fuelType:
          type: string
          enum: [GASOLINE, DIESEL, ETHANOL, FLEX, ELECTRIC, HYBRID]
          description: Tipo de combustível
        cargoCapacityKg:
          type: number
          format: double
          description: Capacidade de carga em kg
          example: 500.0
        passengerCapacity:
          type: integer
          description: Capacidade de passageiros
          example: 5
        engineType:
          type: string
          description: "Tipo do motor (ex: 1.0, 1.8, 2.0, EV)"
          example: "2.0"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    VehicleRequest:
      type: object
      required:
        - plate
        - model
        - brand
        - year
        - chassis
        - renavam
        - fuelType
      properties:
        plate:
          type: string
          description: "Placa do veiculo (Mercosul ou antigo)"
          example: "ABC1D23"
        model:
          type: string
          example: Corolla
        brand:
          type: string
          example: Toyota
        year:
          type: integer
          example: 2023
        color:
          type: string
          example: Preto
        mileage:
          type: number
          format: double
          example: 5000.0
        chassis:
          type: string
          description: "Número do chassi (VIN) - 17 caracteres"
          example: "9BWZZZ377VE000001"
        renavam:
          type: string
          description: "Registro Nacional de Veículos Automotores - 11 dígitos"
          example: "12345678901"
        fuelType:
          type: string
          enum: [GASOLINE, DIESEL, ETHANOL, FLEX, ELECTRIC, HYBRID]
          description: Tipo de combustível
        cargoCapacityKg:
          type: number
          format: double
          description: Capacidade de carga em kg
          example: 500.0
        passengerCapacity:
          type: integer
          description: Capacidade de passageiros
          example: 5
        engineType:
          type: string
          description: "Tipo do motor (ex: 1.0, 1.8, 2.0, EV)"
          example: "2.0"

    VehiclePage:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/Vehicle'
        totalElements:
          type: integer
        totalPages:
          type: integer
