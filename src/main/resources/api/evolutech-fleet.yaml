openapi: 3.0.0
info:
  title: Evolutech Fleet Management API
  description: API para gerenciamento de frota veicular - BFF (Backend for Frontend)
  version: 1.0.0
  contact:
    email: apiteam@evolutech.com
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html

servers:
  - url: http://localhost:8080/api/v1
    description: Desenvolvimento

tags:
  - name: Vehicle
    description: Operações com veículos
  - name: Maintenance
    description: Operações com manutenções
  - name: Driver
    description: Gestão de motoristas
  - name: AuditLog
    description: Consulta de logs de auditoria
  - name: Fine
    description: Operações com multas
  - name: ServiceOrder
    description: Operações com ordens de serviço
  - name: Trip
    description: Gestão de viagens
  - name: VehicleAssignment
    description: Gestão de alocações de veículos

paths:
  /vehicles:
    get:
      tags:
        - Vehicle
      summary: Listar todos os veículos
      operationId: getAllVehicles
      parameters:
        - name: plate
          in: query
          schema:
            type: string
          description: Filtrar por placa (parcial)
        - name: brand
          in: query
          schema:
            type: string
          description: Filtrar por marca (parcial)
        - name: status
          in: query
          schema:
            type: string
            enum: [ACTIVE, INACTIVE, MAINTENANCE, DECOMMISSIONED]
          description: Filtrar por status
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Lista de veículos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VehiclePage'
    post:
      tags:
        - Vehicle
      summary: Criar um novo veículo
      operationId: createVehicle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VehicleRequest'
      responses:
        '201':
          description: Veículo criado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Vehicle'
        '400':
          description: Dados inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Placa duplicada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /vehicles/{id}:
    get:
      tags:
        - Vehicle
      summary: Buscar veículo por ID
      operationId: getVehicleById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Veículo encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Vehicle'
        '404':
          description: Veículo não encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags:
        - Vehicle
      summary: Atualizar um veículo
      operationId: updateVehicle
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VehicleRequest'
      responses:
        '200':
          description: Veículo atualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Vehicle'
        '404':
          description: Veículo não encontrado
        '400':
          description: Dados inválidos
    delete:
      tags:
        - Vehicle
      summary: Deletar um veículo (soft-delete)
      operationId: deleteVehicle
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Veículo deletado
        '404':
          description: Veículo não encontrado

  /vehicles/{id}/status:
    patch:
      tags:
        - Vehicle
      summary: Atualizar status do veículo
      operationId: updateVehicleStatus
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [ACTIVE, INACTIVE, MAINTENANCE, DECOMMISSIONED]
      responses:
        '200':
          description: Status atualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Vehicle'
        '404':
          description: Veículo não encontrado

  /maintenances:
    get:
      tags:
        - Maintenance
      summary: Listar todas as manutenções
      operationId: getAllMaintenances
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Lista de manutenções
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MaintenancePage'
    post:
      tags:
        - Maintenance
      summary: Criar uma nova manutenção
      operationId: createMaintenance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MaintenanceRequest'
      responses:
        '201':
          description: Manutenção criada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Maintenance'
        '400':
          description: Dados inválidos
        '404':
          description: Veículo não encontrado

  /maintenances/{id}:
    get:
      tags:
        - Maintenance
      summary: Buscar manutenção por ID
      operationId: getMaintenanceById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Manutenção encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Maintenance'
        '404':
          description: Manutenção não encontrada
    put:
      tags:
        - Maintenance
      summary: Atualizar uma manutenção
      operationId: updateMaintenance
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MaintenanceRequest'
      responses:
        '200':
          description: Manutenção atualizada
        '404':
          description: Manutenção não encontrada
    delete:
      tags:
        - Maintenance
      summary: Deletar uma manutenção (soft-delete)
      operationId: deleteMaintenance
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Manutenção deletada
        '404':
          description: Manutenção não encontrada

  /maintenances/vehicle/{vehicleId}:
    get:
      tags:
        - Maintenance
      summary: Listar manutenções por veículo
      operationId: getMaintenancesByVehicleId
      parameters:
        - name: vehicleId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Manutenções encontradas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Maintenance'

  /maintenances/status/{status}:
    get:
      tags:
        - Maintenance
      summary: Listar manutenções por status
      operationId: getMaintenancesByStatus
      parameters:
        - name: status
          in: path
          required: true
          schema:
            type: string
            enum: [PENDING, IN_PROGRESS, COMPLETED, OVERDUE]
      responses:
        '200':
          description: Manutenções encontradas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Maintenance'

  /drivers:
    get:
      tags:
        - Driver
      summary: Listar motoristas
      operationId: getAllDrivers
      parameters:
        - name: name
          in: query
          schema:
            type: string
        - name: cpf
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [ACTIVE, INACTIVE, SUSPENDED]
        - name: cnhStatus
          in: query
          schema:
            type: string
            enum: [ACTIVE, EXPIRED, SUSPENDED]
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Lista de motoristas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DriverPage'
    post:
      tags:
        - Driver
      summary: Criar motorista
      operationId: createDriver
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DriverRequest'
      responses:
        '201':
          description: Motorista criado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Driver'
        '400':
          description: Dados inválidos
        '409':
          description: CPF ou CNH duplicada

  /drivers/{id}:
    get:
      tags:
        - Driver
      summary: Buscar motorista por UUID
      operationId: getDriverById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Motorista encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Driver'
        '404':
          description: Motorista não encontrado
    put:
      tags:
        - Driver
      summary: Atualizar motorista
      operationId: updateDriver
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DriverRequest'
      responses:
        '200':
          description: Motorista atualizado
        '404':
          description: Motorista não encontrado
    delete:
      tags:
        - Driver
      summary: Deletar motorista (soft-delete)
      operationId: deleteDriver
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Motorista deletado
        '404':
          description: Motorista não encontrado

  /drivers/{id}/status:
    patch:
      tags:
        - Driver
      summary: Atualizar status do motorista
      operationId: updateDriverStatus
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [ACTIVE, INACTIVE, SUSPENDED]
      responses:
        '200':
          description: Status atualizado
        '404':
          description: Motorista não encontrado

  /drivers/cpf/{cpf}:
    get:
      tags:
        - Driver
      summary: Buscar motorista por CPF
      operationId: getDriverByCpf
      parameters:
        - name: cpf
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Motorista encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Driver'
        '404':
          description: Motorista não encontrado

  /drivers/expiring-cnhs:
    get:
      tags:
        - Driver
      summary: Listar motoristas com CNH vencendo
      operationId: getExpiringCnhs
      parameters:
        - name: days
          in: query
          schema:
            type: integer
            default: 30
      responses:
        '200':
          description: Lista de motoristas com CNH vencendo
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Driver'

  /audit-logs:
    get:
      tags:
        - AuditLog
      summary: Listar todos os logs de auditoria
      operationId: getAllAuditLogs
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Lista de logs de auditoria
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditLogPage'

  /audit-logs/entity/{entityType}:
    get:
      tags:
        - AuditLog
      summary: Listar logs de auditoria por tipo de entidade
      operationId: getAuditLogsByEntityType
      parameters:
        - name: entityType
          in: path
          required: true
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Lista de logs de auditoria
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditLogPage'

  /audit-logs/entity/{entityType}/{entityId}:
    get:
      tags:
        - AuditLog
      summary: Listar logs de auditoria de uma entidade específica
      operationId: getAuditLogsByEntity
      parameters:
        - name: entityType
          in: path
          required: true
          schema:
            type: string
        - name: entityId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Lista de logs de auditoria
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditLogPage'

  /audit-logs/user/{userId}:
    get:
      tags:
        - AuditLog
      summary: Listar logs de auditoria por usuário
      operationId: getAuditLogsByUser
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Lista de logs de auditoria
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditLogPage'

  /fines:
    get:
      tags:
        - Fine
      summary: Listar todas as multas
      operationId: getAllFines
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Lista de multas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FinePage'
    post:
      tags:
        - Fine
      summary: Criar uma nova multa
      operationId: createFine
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FineRequest'
      responses:
        '201':
          description: Multa criada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Fine'
        '400':
          description: Dados inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /fines/{id}:
    get:
      tags:
        - Fine
      summary: Buscar multa por ID
      operationId: getFineById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Multa encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Fine'
        '404':
          description: Multa não encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags:
        - Fine
      summary: Atualizar uma multa
      operationId: updateFine
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FineRequest'
      responses:
        '200':
          description: Multa atualizada
        '404':
          description: Multa não encontrada
    delete:
      tags:
        - Fine
      summary: Deletar uma multa
      operationId: deleteFine
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Multa deletada
        '404':
          description: Multa não encontrada

  /fines/driver/{driverCpf}:
    get:
      tags:
        - Fine
      summary: Listar multas por CPF do motorista
      operationId: getFinesByDriverCpf
      parameters:
        - name: driverCpf
          in: path
          required: true
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Multas encontradas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FinePage'

  /fines/status/{status}:
    get:
      tags:
        - Fine
      summary: Listar multas por status
      operationId: getFinesByStatus
      parameters:
        - name: status
          in: path
          required: true
          schema:
            type: string
            enum: [PENDING, PAID, DISPUTED]
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Multas encontradas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FinePage'

  /fines/vehicle/{vehicleId}:
    get:
      tags:
        - Fine
      summary: Listar multas por veículo
      operationId: getFinesByVehicle
      parameters:
        - name: vehicleId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Multas encontradas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FinePage'

  /service-orders:
    get:
      tags:
        - ServiceOrder
      summary: Listar todas as ordens de serviço
      operationId: getAllServiceOrders
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Lista de ordens de serviço
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceOrderPage'
    post:
      tags:
        - ServiceOrder
      summary: Criar uma nova ordem de serviço
      operationId: createServiceOrder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServiceOrderRequest'
      responses:
        '201':
          description: Ordem de serviço criada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceOrder'
        '400':
          description: Dados inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /service-orders/{id}:
    get:
      tags:
        - ServiceOrder
      summary: Buscar ordem de serviço por ID
      operationId: getServiceOrderById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Ordem de serviço encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceOrder'
        '404':
          description: Ordem de serviço não encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags:
        - ServiceOrder
      summary: Atualizar uma ordem de serviço
      operationId: updateServiceOrder
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServiceOrderRequest'
      responses:
        '200':
          description: Ordem de serviço atualizada
        '404':
          description: Ordem de serviço não encontrada
    delete:
      tags:
        - ServiceOrder
      summary: Deletar uma ordem de serviço
      operationId: deleteServiceOrder
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Ordem de serviço deletada
        '404':
          description: Ordem de serviço não encontrada

  /service-orders/{id}/approve:
    patch:
      tags:
        - ServiceOrder
      summary: Aprovar uma ordem de serviço
      operationId: approveServiceOrder
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServiceOrderApproval'
      responses:
        '200':
          description: Ordem de serviço aprovada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceOrder'

  /service-orders/{id}/reject:
    patch:
      tags:
        - ServiceOrder
      summary: Rejeitar uma ordem de serviço
      operationId: rejectServiceOrder
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServiceOrderApproval'
      responses:
        '200':
          description: Ordem de serviço rejeitada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceOrder'

  /service-orders/{id}/complete:
    patch:
      tags:
        - ServiceOrder
      summary: Concluir uma ordem de serviço
      operationId: completeServiceOrder
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Ordem de serviço concluída
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceOrder'

  /service-orders/status/{status}:
    get:
      tags:
        - ServiceOrder
      summary: Listar ordens de serviço por status
      operationId: getServiceOrdersByStatus
      parameters:
        - name: status
          in: path
          required: true
          schema:
            type: string
            enum: [PENDING, APPROVED, REJECTED, COMPLETED]
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Ordens de serviço encontradas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceOrderPage'

  /service-orders/vehicle/{vehicleId}:
    get:
      tags:
        - ServiceOrder
      summary: Listar ordens de serviço por veículo
      operationId: getServiceOrdersByVehicle
      parameters:
        - name: vehicleId
          in: path
          required: true
          schema:
