components:
  schemas:
    Vehicle:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: UUID único do veículo
        plate:
          type: string
          description: "Placa do veiculo (Mercosul ou antigo)"
          example: "ABC1D23"
        model:
          type: string
          description: Modelo do veículo
          example: Corolla
        brand:
          type: string
          description: Marca do veículo
          example: Toyota
        year:
          type: integer
          description: Ano de fabricação
          example: 2023
        color:
          type: string
          description: Cor do veículo
          example: Preto
        mileage:
          type: number
          format: double
          description: Quilometragem
          example: 5000.0
        status:
          type: string
          enum: [ACTIVE, INACTIVE, MAINTENANCE, DECOMMISSIONED]
          description: Status do veículo
        chassis:
          type: string
          description: "Número do chassi (VIN) - 17 caracteres"
          example: "9BWZZZ377VE000001"
        renavam:
          type: string
          description: "Registro Nacional de Veículos Automotores - 11 dígitos"
          example: "12345678901"
        fuelType:
          type: string
          enum: [GASOLINE, DIESEL, ETHANOL, FLEX, ELECTRIC, HYBRID]
          description: Tipo de combustível
        cargoCapacityKg:
          type: number
          format: double
          description: Capacidade de carga em kg
          example: 500.0
        passengerCapacity:
          type: integer
          description: Capacidade de passageiros
          example: 5
        engineType:
          type: string
          description: "Tipo do motor (ex: 1.0, 1.8, 2.0, EV)"
          example: "2.0"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    VehicleRequest:
      type: object
      required:
        - plate
        - model
        - brand
        - year
        - chassis
        - renavam
        - fuelType
      properties:
        plate:
          type: string
          description: "Placa do veiculo (Mercosul ou antigo)"
          example: "ABC1D23"
        model:
          type: string
          example: Corolla
        brand:
          type: string
          example: Toyota
        year:
          type: integer
          example: 2023
        color:
          type: string
          example: Preto
        mileage:
          type: number
          format: double
          example: 5000.0
        chassis:
          type: string
          description: "Número do chassi (VIN) - 17 caracteres"
          example: "9BWZZZ377VE000001"
        renavam:
          type: string
          description: "Registro Nacional de Veículos Automotores - 11 dígitos"
          example: "12345678901"
        fuelType:
          type: string
          enum: [GASOLINE, DIESEL, ETHANOL, FLEX, ELECTRIC, HYBRID]
          description: Tipo de combustível
        cargoCapacityKg:
          type: number
          format: double
          description: Capacidade de carga em kg
          example: 500.0
        passengerCapacity:
          type: integer
          description: Capacidade de passageiros
          example: 5
        engineType:
          type: string
          description: "Tipo do motor (ex: 1.0, 1.8, 2.0, EV)"
          example: "2.0"

    VehiclePage:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/Vehicle'
        totalElements:
          type: integer
        totalPages:
          type: integer
        size:
          type: integer
        number:
          type: integer

    Maintenance:
      type: object
      properties:
        id:
          type: string
          format: uuid
        vehicleId:
          type: string
          format: uuid
        description:
          type: string
          example: Troca de óleo
        type:
          type: string
          enum: [MAINTENANCE, FUEL, TOLL, PARKING, OTHER]
        cost:
          type: number
          format: double
          example: 150.00
        mileage:
          type: number
          format: double
          description: Quilometragem atual
        nextMileage:
          type: number
          format: double
          description: Próxima manutenção
        status:
          type: string
          enum: [PENDING, IN_PROGRESS, COMPLETED, OVERDUE]
        maintenanceDate:
          type: string
          format: date
          example: 2024-01-15
        serviceOrderId:
          type: string
          format: uuid
          description: ID da Ordem de Serviço vinculada
        costCenterId:
          type: string
          description: ID do centro de custo
        projectId:
          type: string
          description: ID do projeto
        invoiceFuelType:
          type: string
