services:
  mysql:
    image: 'mysql:8.0'
    container_name: fleet-mysql
    environment:
      MYSQL_ROOT_PASSWORD: '${MYSQL_ROOT_PASSWORD:-}'
      MYSQL_DATABASE: fleet_db
      MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - fleet-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  fleet-network:
    name: fleet-network
    driver: bridge

volumes:
  mysql_data:
